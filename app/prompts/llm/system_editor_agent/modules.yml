adi:
  label: ADI
  description: Accumulation/Distribution Index. Uses high, low, close, volume. No params.
  output: value
  params: {}
adtv:
  label: ADTV
  description: Average Daily Trading Volume.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
adx:
  label: ADX
  description: Average Directional Index. Returns adx, di_pos, di_neg.
  output: adx, di_pos, di_neg
  params:
    period: { type: integer, description: Lookback period. }
ao:
  label: AO
  description: Awesome Oscillator (momentum).
  output: value
  params:
    short_period: { type: integer, description: Short period. }
    long_period: { type: integer, description: Long period. }
atr:
  label: ATR
  description: Average True Range (volatility).
  output: value
  params:
    period: { type: integer, description: Lookback period. }
bb:
  label: BB
  description: Bollinger Bands. Returns upper_band, middle_band, lower_band.
  output: upper_band, middle_band, lower_band
  params:
    period: { type: integer, description: Lookback period. }
    standard_deviations: { type: number, description: Number of standard deviations. }
cci:
  label: CCI
  description: Commodity Channel Index.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
    constant: { type: number, description: Scaling constant (default 0.015). }
cmf:
  label: CMF
  description: Chaikin Money Flow.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
cr:
  label: CR
  description: Cumulative Return. No params.
  output: value
  params: {}
dc:
  label: DC
  description: Donchian Channel. Returns upper_bound, lower_bound.
  output: upper_bound, lower_bound
  params:
    period: { type: integer, description: Lookback period. }
dlr:
  label: DLR
  description: Daily Log Return. No params.
  output: value
  params: {}
dpo:
  label: DPO
  description: Detrended Price Oscillator.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
dr:
  label: DR
  description: Daily Return. No params.
  output: value
  params: {}
ema:
  label: EMA
  description: Exponential Moving Average over close prices.
  output: value
  params:
    period: { type: integer, description: Lookback period. Must be >= 1. }
eom:
  label: EOM
  description: Ease of Movement.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
fi:
  label: FI
  description: Force Index. Uses close and volume. No params.
  output: value
  params: {}
ichimoku:
  label: Ichimoku
  description: Ichimoku Kinko Hyo. Returns tenkan_sen, kijun_sen, senkou_span_a, senkou_span_b, chikou_span.
  output: tenkan_sen, kijun_sen, senkou_span_a, senkou_span_b, chikou_span
  params:
    low_period: { type: integer, description: Tenkan-sen period (default 9). }
    medium_period: { type: integer, description: Kijun-sen period (default 26). }
    high_period: { type: integer, description: Senkou Span B period (default 52). }
kc:
  label: KC
  description: Keltner Channel. Returns upper_band, middle_band, lower_band.
  output: upper_band, middle_band, lower_band
  params:
    period: { type: integer, description: Lookback period. }
kst:
  label: KST
  description: Know Sure Thing momentum oscillator.
  output: value
  params:
    period: { type: integer, description: Base period. }
    roc1: { type: integer, description: ROC period 1. }
    roc2: { type: integer, description: ROC period 2. }
    roc3: { type: integer, description: ROC period 3. }
    roc4: { type: integer, description: ROC period 4. }
    sma1: { type: integer, description: SMA period 1. }
    sma2: { type: integer, description: SMA period 2. }
    sma3: { type: integer, description: SMA period 3. }
    sma4: { type: integer, description: SMA period 4. }
macd:
  label: MACD
  description: MACD. Returns macd_line, signal_line, macd_histogram.
  output: macd_line, signal_line, macd_histogram
  params:
    fast_period: { type: integer, description: Fast EMA period (default 12). }
    slow_period: { type: integer, description: Slow EMA period (default 26). }
    signal_period: { type: integer, description: Signal line period (default 9). }
mfi:
  label: MFI
  description: Money Flow Index (volume-weighted RSI).
  output: value
  params:
    period: { type: integer, description: Lookback period. }
mi:
  label: MI
  description: Mass Index (volatility indicator).
  output: value
  params:
    ema_period: { type: integer, description: EMA period. }
    sum_period: { type: integer, description: Sum period. }
nvi:
  label: NVI
  description: Negative Volume Index. No params.
  output: value
  params: {}
obv:
  label: OBV
  description: On-balance Volume. No params.
  output: value
  params: {}
obv_mean:
  label: OBV Mean
  description: On-balance Volume smoothed with SMA.
  output: value
  params:
    period: { type: integer, description: Smoothing period. }
rsi:
  label: RSI
  description: Relative Strength Index over close prices.
  output: value
  params:
    period: { type: integer, description: Lookback period. Must be >= 1. }
sma:
  label: SMA
  description: Simple Moving Average over close prices.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
sr:
  label: SR
  description: Stochastic Oscillator. Returns sr, sr_signal.
  output: sr, sr_signal
  params:
    period: { type: integer, description: Lookback period. }
    signal_period: { type: integer, description: Signal smoothing period. }
trix:
  label: TRIX
  description: Triple Exponential Average (momentum).
  output: value
  params:
    period: { type: integer, description: Lookback period. }
tsi:
  label: TSI
  description: True Strength Index.
  output: value
  params:
    low_period: { type: integer, description: Low period. }
    high_period: { type: integer, description: High period. }
uo:
  label: UO
  description: Ultimate Oscillator (combines three timeframes).
  output: value
  params:
    short_period: { type: integer, description: Short period (default 7). }
    medium_period: { type: integer, description: Medium period (default 14). }
    long_period: { type: integer, description: Long period (default 28). }
    short_weight: { type: number, description: Short weight (default 4). }
    medium_weight: { type: number, description: Medium weight (default 2). }
    long_weight: { type: number, description: Long weight (default 1). }
vi:
  label: VI
  description: Vortex Indicator. Returns positive_vi, negative_vi.
  output: positive_vi, negative_vi
  params:
    period: { type: integer, description: Lookback period. }
vpt:
  label: VPT
  description: Volume-price Trend. No params.
  output: value
  params: {}
vwap:
  label: VWAP
  description: Volume Weighted Average Price. No params.
  output: value
  params: {}
wma:
  label: WMA
  description: Weighted Moving Average over close prices.
  output: value
  params:
    period: { type: integer, description: Lookback period. }
wr:
  label: WR
  description: Williams %R (momentum oscillator).
  output: value
  params:
    period: { type: integer, description: Lookback period. }
