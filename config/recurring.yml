production:
  candle_sync:
    class: CandleSyncJob
    schedule: every minute

  macro_sync_hourly:
    class: MacroSyncJob
    args: [{ frequency: "hourly" }]
    schedule: every hour at minute 5

  macro_sync_daily:
    class: MacroSyncJob
    args: [{ frequency: "daily" }]
    schedule: every day at 14:30 UTC

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  candle_sync:
    class: CandleSyncJob
    schedule: every minute

  macro_sync_hourly:
    class: MacroSyncJob
    args: [{ frequency: "hourly" }]
    schedule: every hour at minute 5

  macro_sync_daily:
    class: MacroSyncJob
    args: [{ frequency: "daily" }]
    schedule: every day at 14:30 UTC
