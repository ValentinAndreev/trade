id: rsi_threshold
name: RSI Threshold Reversal

module:
  type: rsi
  params:
    period: 14

params:
  position_mode: long_short
  lower_threshold: 30
  upper_threshold: 70

conditions:
  long_entry:
    operator: cross_below
    left: module.value
    right: params.lower_threshold
  long_exit:
    operator: cross_above
    left: module.value
    right: params.upper_threshold
  short_entry:
    operator: cross_above
    left: module.value
    right: params.upper_threshold
  short_exit:
    operator: cross_below
    left: module.value
    right: params.lower_threshold

optimization:
  targets:
    - module.period
    - params.lower_threshold
    - params.upper_threshold
