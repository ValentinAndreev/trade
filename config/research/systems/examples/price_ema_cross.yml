id: price_ema_cross2
name: Price / EMA Cross

module:
  type: ema
  params:
    period: 20

params:
  position_mode: long_short

conditions:
  long_entry:
    operator: cross_above
    left: close
    right: module.value
  long_exit:
    operator: cross_below
    left: close
    right: module.value
  short_entry:
    operator: cross_below
    left: close
    right: module.value
  short_exit:
    operator: cross_above
    left: close
    right: module.value

optimization:
  targets:
    - module.period
