id: price_ema_cross
name: Price / EMA Cross

modules:
  ema:
    period: 20

params:
  position_mode: long_short

conditions:
  long_entry: "close >> ema.value"
  long_exit: "close << ema.value"
  short_entry: "close << ema.value"
  short_exit: "close >> ema.value"

optimization:
  targets:
    - ema.period
