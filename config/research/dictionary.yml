root_keys:
  - id
  - name
  - modules
  - params
  - conditions
  - optimization

module_keys:
  - type

modules:
  types:
    ema:
      label: EMA
      params:
        period:
          type: integer
          min: 1
          label: EMA period
    rsi:
      label: RSI
      params:
        period:
          type: integer
          min: 1
          label: RSI period

params:
  position_mode:
    type: enum
    label: Position mode
    values:
      - long_short
      - long_only
      - short_only
  lower_threshold:
    type: number
    label: Lower threshold
  upper_threshold:
    type: number
    label: Upper threshold

conditions:
  keys:
    - long_entry
    - long_exit
    - short_entry
    - short_exit
  operators:
    ">>":
      label: Cross above
    "<<":
      label: Cross below
    ">":
      label: Greater than
    ">=":
      label: Greater or equal
    "<":
      label: Less than
    "<=":
      label: Less or equal
    "&&":
      label: Logical and
    "||":
      label: Logical or
  functions:
    abs:
      label: Absolute value
    min:
      label: Minimum
    max:
      label: Maximum
    prev:
      label: Previous bar value
    offset:
      label: Value N bars back

references:
  fields:
    - open
    - high
    - low
    - close
    - volume
  values:
    - value

optimization:
  keys:
    - targets
