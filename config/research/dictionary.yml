root_keys:
  - id
  - name
  - modules
  - params
  - conditions
  - optimization

module_keys:
  - type

modules:
  types:
    adi:
      label: Accumulation/Distribution Index
      params: {}
    adtv:
      label: Average Daily Trading Volume
      params:
        period:
          type: integer
          min: 1
          label: Period
    adx:
      label: Average Directional Index
      params:
        period:
          type: integer
          min: 1
          label: Period
    ao:
      label: Awesome Oscillator
      params:
        short_period:
          type: integer
          min: 1
          label: Short Period
        long_period:
          type: integer
          min: 1
          label: Long Period
    atr:
      label: Average True Range
      params:
        period:
          type: integer
          min: 1
          label: Period
    bb:
      label: Bollinger Bands
      params:
        period:
          type: integer
          min: 1
          label: Period
        standard_deviations:
          type: number
          min: 0.1
          label: Standard Deviations
    cci:
      label: Commodity Channel Index
      params:
        period:
          type: integer
          min: 1
          label: Period
        constant:
          type: number
          min: 0.001
          label: Constant
    cmf:
      label: Chaikin Money Flow
      params:
        period:
          type: integer
          min: 1
          label: Period
    cr:
      label: Cumulative Return
      params: {}
    dc:
      label: Donchian Channel
      params:
        period:
          type: integer
          min: 1
          label: Period
    dlr:
      label: Daily Log Return
      params: {}
    dpo:
      label: Detrended Price Oscillator
      params:
        period:
          type: integer
          min: 1
          label: Period
    dr:
      label: Daily Return
      params: {}
    ema:
      label: Exponential Moving Average
      params:
        period:
          type: integer
          min: 1
          label: Period
    eom:
      label: Ease of Movement
      params:
        period:
          type: integer
          min: 1
          label: Period
    fi:
      label: Force Index
      params: {}
    ichimoku:
      label: Ichimoku Kinko Hyo
      params:
        low_period:
          type: integer
          min: 1
          label: Low Period
        medium_period:
          type: integer
          min: 1
          label: Medium Period
        high_period:
          type: integer
          min: 1
          label: High Period
    kc:
      label: Keltner Channel
      params:
        period:
          type: integer
          min: 1
          label: Period
    kst:
      label: Know Sure Thing
      params:
        period:
          type: integer
          min: 1
          label: Period
        roc1:
          type: integer
          min: 1
          label: ROC 1
        roc2:
          type: integer
          min: 1
          label: ROC 2
        roc3:
          type: integer
          min: 1
          label: ROC 3
        roc4:
          type: integer
          min: 1
          label: ROC 4
        sma1:
          type: integer
          min: 1
          label: SMA 1
        sma2:
          type: integer
          min: 1
          label: SMA 2
        sma3:
          type: integer
          min: 1
          label: SMA 3
        sma4:
          type: integer
          min: 1
          label: SMA 4
    macd:
      label: Moving Average Convergence Divergence
      params:
        fast_period:
          type: integer
          min: 1
          label: Fast Period
        slow_period:
          type: integer
          min: 1
          label: Slow Period
        signal_period:
          type: integer
          min: 1
          label: Signal Period
    mfi:
      label: Money Flow Index
      params:
        period:
          type: integer
          min: 1
          label: Period
    mi:
      label: Mass Index
      params:
        ema_period:
          type: integer
          min: 1
          label: EMA Period
        sum_period:
          type: integer
          min: 1
          label: Sum Period
    nvi:
      label: Negative Volume Index
      params: {}
    obv:
      label: On-balance Volume
      params: {}
    obv_mean:
      label: On-balance Volume Mean
      params:
        period:
          type: integer
          min: 1
          label: Period
    rsi:
      label: Relative Strength Index
      params:
        period:
          type: integer
          min: 1
          label: Period
    sma:
      label: Simple Moving Average
      params:
        period:
          type: integer
          min: 1
          label: Period
    sr:
      label: Stochastic Oscillator
      params:
        period:
          type: integer
          min: 1
          label: Period
        signal_period:
          type: integer
          min: 1
          label: Signal Period
    trix:
      label: Triple Exponential Average
      params:
        period:
          type: integer
          min: 1
          label: Period
    tsi:
      label: True Strength Index
      params:
        low_period:
          type: integer
          min: 1
          label: Low Period
        high_period:
          type: integer
          min: 1
          label: High Period
    uo:
      label: Ultimate Oscillator
      params:
        short_period:
          type: integer
          min: 1
          label: Short Period
        medium_period:
          type: integer
          min: 1
          label: Medium Period
        long_period:
          type: integer
          min: 1
          label: Long Period
        short_weight:
          type: number
          min: 0
          label: Short Weight
        medium_weight:
          type: number
          min: 0
          label: Medium Weight
        long_weight:
          type: number
          min: 0
          label: Long Weight
    vi:
      label: Vortex Indicator
      params:
        period:
          type: integer
          min: 1
          label: Period
    vpt:
      label: Volume-price Trend
      params: {}
    vwap:
      label: Volume Weighted Average Price
      params: {}
    wma:
      label: Weighted Moving Average
      params:
        period:
          type: integer
          min: 1
          label: Period
    wr:
      label: Williams %R
      params:
        period:
          type: integer
          min: 1
          label: Period

params:
  position_mode:
    type: enum
    label: Position mode
    values:
      - long_short
      - long_only
      - short_only
  lower_threshold:
    type: number
    label: Lower threshold
  upper_threshold:
    type: number
    label: Upper threshold

conditions:
  keys:
    - long_entry
    - long_exit
    - short_entry
    - short_exit

macro_indicators:
  dxy:
    label: DXY (Dollar Index)
    category: macro
    params: {}
  vix:
    label: VIX
    category: macro
    params: {}
  fear_greed:
    label: Crypto Fear & Greed
    category: macro
    params: {}
  fed_rate:
    label: Fed Funds Rate
    category: macro
    params: {}
  m2:
    label: M2 Money Supply
    category: macro
    params: {}
  cpi:
    label: CPI (Inflation)
    category: macro
    params: {}

references:
  fields:
    - open
    - high
    - low
    - close
    - volume
    - dxy
    - vix
    - fear_greed
    - fed_rate
    - m2
    - cpi
  values:
    - value

optimization:
  keys:
    - targets
