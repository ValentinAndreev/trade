root_keys:
  - id
  - name
  - modules
  - params
  - conditions
  - optimization

module_keys:
  - type

params:
  position_mode:
    type: enum
    label: Position mode
    values:
      - long_short
      - long_only
      - short_only
  lower_threshold:
    type: number
    label: Lower threshold
  upper_threshold:
    type: number
    label: Upper threshold

conditions:
  keys:
    - long_entry
    - long_exit
    - short_entry
    - short_exit

references:
  fields:
    - open
    - high
    - low
    - close
    - volume
  values:
    - value

optimization:
  keys:
    - targets
